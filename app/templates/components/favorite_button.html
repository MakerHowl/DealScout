<button class="favorite-toggle-btn {% if is_favorite %}active{% endif %}"
        hx-post="/toggle-favorite"
        hx-vals='{"id": "{{ id }}", "name": "{{ name }}", "street": "{{ street }}", "zip_code": "{{ zip_code }}", "city": "{{ city }}", "url": "{{ url }}", "offers_url": "{{ offers_url }}"}'
        hx-swap="outerHTML"
        title="{% if is_favorite %}Aus Favoriten entfernen{% else %}Zu Favoriten hinzufügen{% endif %}">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="star-icon">
        <path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/>
    </svg>
</button>
