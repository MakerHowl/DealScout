{% extends "base.html" %}

{% block title %}Anmelden - DealScout{% endblock %}

{% block content %}
<div class="auth-wrapper fade-in" style="max-width: 440px; margin: 2rem auto;">
    <div class="glass-card" style="padding: 2.5rem;">
        <h2 class="card-title" style="text-align: center; margin-bottom: 0.5rem;">Willkommen zurück!</h2>
        <p class="card-desc" style="text-align: center; margin-bottom: 2rem;">Melde dich an, um deine Favoriten und Produkte zu verwalten.</p>

        {% if error %}
            <div class="alert alert-danger" style="background: rgba(239, 68, 68, 0.15); border: 1px solid rgba(239, 68, 68, 0.3); color: #F87171; padding: 0.75rem 1rem; border-radius: 12px; margin-bottom: 1.5rem; font-size: 0.9rem;">
                {{ error }}
            </div>
        {% endif %}

        <form action="/login" method="post" style="display: flex; flex-direction: column; gap: 1.25rem;">
            <div>
                <label for="username" style="display: block; font-size: 0.9rem; font-weight: 500; color: var(--text-secondary); margin-bottom: 0.5rem;">E-Mail-Adresse</label>
                <input type="email" id="username" name="username" value="{{ email or '' }}" class="form-input" style="width: 100%;" required autofocus placeholder="name@beispiel.de">
            </div>

            <div>
                <label for="password" style="display: block; font-size: 0.9rem; font-weight: 500; color: var(--text-secondary); margin-bottom: 0.5rem;">Passwort</label>
                <input type="password" id="password" name="password" class="form-input" style="width: 100%;" required placeholder="••••••••">
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.85rem; font-size: 1rem; font-weight: 600; margin-top: 0.5rem;">Anmelden</button>
        </form>

        <div style="text-align: center; margin-top: 1.75rem; font-size: 0.9rem; color: var(--text-secondary);">
            Noch kein Konto? <a href="/register" style="color: var(--primary); font-weight: 600; text-decoration: none;">Jetzt registrieren</a>
        </div>
    </div>
</div>
{% endblock %}
